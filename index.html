<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Slight Return Generator</title>
  <link rel="stylesheet" href="/src/styles/style.css">
</head>

<!-- The 'controls-hidden' class manages the toggle between editor and preview on mobile -->

<body class="controls-hidden">
  <header class="app-header">
    <div class="header-content">
      <h1>Slight Return Socials Generator</h1>
      <!-- Mobile-only actions -->
      <div class="header-actions">
        <button data-action="toggle-editor" class="header-toggle-btn">Toggle Editor</button>
        <button data-action="export-mobile" class="header-export-btn">Download</button>
      </div>
    </div>
  </header>

  <div data-ui="app-layout" class="main-layout">
    <!-- Sidebar: Contains all user configuration inputs -->
    <aside class="sidebar">
      <h1>Slight Return Socials Generator</h1>
      <section class="control-group">
        <h3>1. Select Size</h3>
        <select data-config="size">
          <option value="insta-post">Instagram Post (4:5)</option>
          <option value="insta-story">Instagram Story (9:16)</option>
          <option value="a4-print">A4 Print (300 DPI)</option>
        </select>
      </section>

      <section class="control-group">
        <h3>2. Select Theme</h3>
        <!-- Populated dynamically from themes.json -->
        <select data-config="theme"></select>
      </section>

      <section class="control-group">
        <h3>3. Gig Details</h3>
        <input type="text" data-field="venue" placeholder="Venue Name">
        <input type="text" data-field="town" placeholder="Town">
        <input type="text" data-field="postcode" placeholder="Venue Postcode">
        <input type="text" data-field="web-address" placeholder="Website / Tickets URL">
        <input type="date" data-field="date" placeholder="Gig Date">
        <div class="split-input">
          <input type="time" data-field="start-time" placeholder="Starts">
          <input type="time" data-field="end-time" placeholder="Ends">
        </div>
      </section>

      <section class="control-group">
        <h3>4. Optional Banner Control</h3>
        <input type="text" data-field="banner-text" placeholder="Banner Text (e.g. TONIGHT or SOLD OUT)">
        <label class="checkbox-label">
          <input type="checkbox" data-field="banner-toggle"> Show Update Banner
        </label>
      </section>

      <button data-action="export" class="primary-btn">Download High-Res PNG</button>
    </aside>

    <!-- Preview Area: Handles the scaled representation of the high-res artboard -->
    <main class="preview-area">
      <!-- Floating Zoom Controls: Linked to CSS variables for scaling -->
      <div class="preview-zoom-container">
        <label for="zoom-slider">Zoom</label>
        <input type="range" data-ui="zoom-slider" min="0.5" max="3.0" step="0.01" value="1.0">
        <span data-ui="zoom-value">100%</span>
      </div>

      <div data-ui="poster-artboard" class="poster-canvas insta-post">
        <!-- Theme HTML will be injected here -->
        <div data-ui="theme-root" class="poster-content"></div>
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
